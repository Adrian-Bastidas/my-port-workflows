name: Get PR Diff and Trigger Agent

on:
  workflow_dispatch:
    inputs:
      pr:
        required: true
        type: string
      repo:
        required: true
        type: string
      entity_identifier:
        required: true
        type: string

jobs:
  get-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Get PR diff and invoke agent
        env:
          GITHUB_TOKEN: ${{ secrets.COMMENT_ON_PR_TOKEN }}
          PORT_TOKEN: ${{ secrets.PORT_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.event.inputs.repo }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.event.inputs.repo }}" | cut -d'/' -f2)

          DIFF=$(gh pr diff ${{ github.event.inputs.pr }} --repo "$OWNER/$REPO" | head -c 8000)

          curl -X POST "https://api.port.io/v1/agent/pr_review_assistant/invoke" \
            -H "Authorization: Bearer $PORT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"prompt\": \"Analyze pull request with entity identifier '${{ github.event.inputs.entity_identifier }}'. Here is the code diff:\n\n$DIFF\",
              \"labels\": {
                \"source\": \"Automation\",
                \"prNumber\": \"${{ github.event.inputs.pr }}\",
                \"repo\": \"${{ github.event.inputs.repo }}\"
              }
            }"
