name: Get PR Diff and Trigger Agent

on:
  workflow_dispatch:
    inputs:
      pr:
        required: true
        type: string
      repo:
        required: true
        type: string
      entity_identifier:
        required: true
        type: string

jobs:
  get-diff-and-invoke:
    runs-on: ubuntu-latest
    steps:
      - name: Get Port token
        id: port_token
        run: |
          RESPONSE=$(curl -s -X POST "https://api.port.io/v1/auth/access_token" \
            -H "Content-Type: application/json" \
            -d "{
              \"clientId\": \"${{ secrets.PORT_CLIENT_ID }}\",
              \"clientSecret\": \"${{ secrets.PORT_CLIENT_SECRET }}\"
            }")
          TOKEN=$(echo $RESPONSE | jq -r '.accessToken')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Get PR diff
        id: pr_diff
        env:
          GITHUB_TOKEN: ${{ secrets.COMMENT_ON_PR_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.event.inputs.repo }}" | cut -d'/' -f1)
          REPO=$(echo "${{ github.event.inputs.repo }}" | cut -d'/' -f2)
          DIFF=$(gh pr diff ${{ github.event.inputs.pr }} --repo "$OWNER/$REPO" | head -c 8000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Invoke Port agent
        env:
          PORT_TOKEN: ${{ steps.port_token.outputs.token }}
          DIFF: ${{ steps.pr_diff.outputs.diff }}
          ENTITY_ID: ${{ github.event.inputs.entity_identifier }}
          PR_NUMBER: ${{ github.event.inputs.pr }}
          REPO: ${{ github.event.inputs.repo }}
        run: |
          PROMPT="Analyze pull request with entity identifier '${ENTITY_ID}'. Here is the code diff:\n\n${DIFF}"

          BODY=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg prNumber "$PR_NUMBER" \
            --arg repo "$REPO" \
            '{
              prompt: $prompt,
              labels: {
                source: "Automation",
                prNumber: $prNumber,
                repo: $repo
              }
            }')

          curl -s -X POST "https://api.port.io/v1/agent/pr_review_assistant/invoke" \
            -H "Authorization: Bearer $PORT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY"
